version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bizal}
      POSTGRES_USER: ${DB_USER:-bizal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bizalpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bizal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn bizal.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - media_files:/app/media
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: bizal.settings.base
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build: .
    command: celery -A bizal worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: bizal.settings.base
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A bizal beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: bizal.settings.base
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  postgres_data:
  media_files:
