<!DOCTYPE html>
<html lang="sq" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizAL — Superadmin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --primary: #2563EB; --primary-rgb: 37,99,235; --primary-dark: #1D4ED8;
      --accent: #F59E0B; --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
      --bg: #F1F5F9; --surface: #FFFFFF; --border: #E2E8F0; --border-strong: #CBD5E1;
      --text: #0F172A; --text-muted: #64748B; --text-subtle: #94A3B8;
      --sidebar-bg: #0F172A; --sidebar-text: #CBD5E1; --sidebar-active: #2563EB;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);
      --font: 'Inter', system-ui, sans-serif; --transition: .18s ease;
    }
    [data-theme="dark"] {
      --bg: #0F172A; --surface: #1E293B; --border: #334155; --border-strong: #475569;
      --text: #F1F5F9; --text-muted: #94A3B8; --text-subtle: #64748B;
      --sidebar-bg: #020617; --shadow: 0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;display:flex}

    /* ── Login screen ── */
    .login-screen {
      min-height: 100vh; width: 100%; display: flex; align-items: center;
      justify-content: center; background: var(--bg); padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: var(--shadow-md);
    }
    .login-logo { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .login-logo span { color: var(--primary); }
    .login-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(239,68,68,.1); color: var(--danger);
      border: 1px solid rgba(239,68,68,.2); padding: 4px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
      margin-bottom: 24px;
    }

    /* ── Layout ── */
    .app-shell { display: flex; width: 100%; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--sidebar-bg);
      display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
      overflow-y: auto; z-index: 50;
    }
    .sidebar-header {
      padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo { font-size: 1.4rem; font-weight: 900; color: #fff; }
    .sidebar-logo span { color: var(--primary); }
    .sidebar-role {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      color: rgba(255,255,255,.35); margin-top: 4px;
    }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-section {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: rgba(255,255,255,.25); padding: 16px 8px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      color: var(--sidebar-text); text-decoration: none; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      transition: var(--transition);
    }
    .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.active { background: rgba(37,99,235,.25); color: #fff; }
    .nav-item .nav-icon { width: 20px; text-align: center; font-size: 16px; }
    .sidebar-footer {
      padding: 16px 12px; border-top: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-user { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user-role { font-size: 11px; color: rgba(255,255,255,.4); }
    .sidebar-logout {
      background: none; border: none; color: rgba(255,255,255,.4); cursor: pointer;
      font-size: 18px; padding: 6px; border-radius: var(--radius-sm); transition: var(--transition);
    }
    .sidebar-logout:hover { color: var(--danger); background: rgba(239,68,68,.1); }

    /* ── Main content ── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      background: var(--surface); border-bottom: 1.5px solid var(--border);
      padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .content { padding: 32px; flex: 1; }

    /* ── Stats row ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
    }
    .stat-card-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
    .stat-card-value { font-size: 2rem; font-weight: 900; color: var(--primary); line-height: 1; }
    .stat-card-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
    .stat-card.green .stat-card-value { color: var(--success); }
    .stat-card.amber .stat-card-value { color: var(--warning); }
    .stat-card.red   .stat-card-value { color: var(--danger); }

    /* ── Panels ── */
    .panel {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .panel-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .panel-title { font-size: 1rem; font-weight: 700; }
    .panel-body { padding: 24px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px;
      cursor: pointer; border: 2px solid transparent; transition: var(--transition);
      text-decoration: none; white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-outline { background: transparent; color: var(--primary); border-color: var(--primary); }
    .btn-outline:hover:not(:disabled) { background: var(--primary); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }
    .btn-block { width: 100%; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); border-bottom: 1.5px solid var(--border); white-space: nowrap; }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-active   { background: rgba(16,185,129,.12); color: var(--success); }
    .badge-inactive { background: rgba(100,116,139,.12); color: var(--text-muted); }
    .badge-starter  { background: rgba(100,116,139,.12); color: var(--text-muted); }
    .badge-pro      { background: rgba(37,99,235,.12);   color: var(--primary); }
    .badge-enterprise { background: rgba(124,58,237,.12); color: #7C3AED; }
    .badge-pending  { background: rgba(245,158,11,.12); color: var(--warning); }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .form-input, .form-select {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font);
      background: var(--bg); color: var(--text); transition: var(--transition);
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb),.12); background: var(--surface);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row { display: flex; gap: 12px; }

    /* ── Modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal.hidden { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); }
    .modal-box {
      position: relative; z-index: 1; background: var(--surface);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: modal-in .18s ease;
    }
    @keyframes modal-in { from{opacity:0;transform:scale(.96) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-close { position: absolute; top: 16px; right: 16px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .modal-close:hover { background: var(--danger); color: #fff; }
    .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 24px; }

    /* ── Toast ── */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: var(--surface); color: var(--text); padding: 13px 18px; border-radius: var(--radius-sm); box-shadow: var(--shadow-md); font-size: 14px; font-weight: 500; border-left: 4px solid var(--success); pointer-events: all; animation: toast-in .2s ease; border: 1px solid var(--border); max-width: 320px; }
    .toast.error { border-left-color: var(--danger); }
    @keyframes toast-in { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

    /* ── Misc ── */
    .hidden { display: none !important; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .search-input { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--text); min-width: 240px; transition: var(--transition); }
    .search-input:focus { outline: none; border-color: var(--primary); background: var(--surface); }
    .theme-toggle { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1.5px solid var(--border); cursor: pointer; font-size: 16px; transition: var(--transition); }
    .theme-toggle:hover { border-color: var(--primary); }
    .empty-row td { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .tenant-avatar { width: 36px; height: 36px; border-radius: var(--radius-sm); background: rgba(var(--primary-rgb),.12); color: var(--primary); font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .tenant-name-cell { display: flex; align-items: center; gap: 10px; }
    .tenant-name-text { font-weight: 600; }
    .tenant-slug { font-size: 12px; color: var(--text-muted); }
    .feedback { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 14px; border: 1px solid transparent; margin-top: 12px; }
    .feedback.success { background: rgba(16,185,129,.1); color: var(--success); border-color: rgba(16,185,129,.25); }
    .feedback.error   { background: rgba(239,68,68,.1);  color: var(--danger);  border-color: rgba(239,68,68,.25); }

    @media (max-width: 900px) {
      .sidebar { width: 220px; }
      .content { padding: 20px; }
    }
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">Biz<span>AL</span></div>
    <div class="login-subtitle">Platforma #1 për bizneset shqiptare</div>
    <div class="login-badge">🔐 Akses i Kufizuar — Vetëm Superadmin</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="login-email" type="email" class="form-input" placeholder="admin@bizal.al" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label">Fjalëkalim</label>
      <input id="login-password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-block" id="login-btn" style="margin-top:8px;padding:13px">Kyçu →</button>
    <div id="login-error" class="feedback error hidden" style="margin-top:12px"></div>
  </div>
</div>

<!-- ── APP SHELL ── -->
<div id="app-shell" class="app-shell hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Biz<span>AL</span></div>
      <div class="sidebar-role">Superadmin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Dashboard</div>
      <button class="nav-item active" data-view="dashboard"><span class="nav-icon">📊</span> Dashboard</button>

      <div class="sidebar-section">Tenants</div>
      <button class="nav-item" data-view="tenants"><span class="nav-icon">🏢</span> Të gjithë Tenantët</button>
      <button class="nav-item" data-view="pending"><span class="nav-icon">⏳</span> Në Pritje</button>

      <div class="sidebar-section">Platforma</div>
      <button class="nav-item" data-view="users"><span class="nav-icon">👥</span> Përdoruesit</button>
      <button class="nav-item" data-view="plans"><span class="nav-icon">💳</span> Planet</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="sidebar-user-name">Admin</div>
        <div class="sidebar-user-role">superadmin</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Dil">⏻</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <button class="theme-toggle" id="theme-toggle">🌙</button>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content" id="main-content">
      <div style="text-align:center;padding:80px;color:var(--text-muted)"><div class="spinner" style="width:32px;height:32px;border-width:3px;margin:0 auto 16px"></div><p>Duke ngarkuar...</p></div>
    </main>

  </div>
</div>

<!-- ── TENANT EDIT MODAL ── -->
<div class="modal hidden" id="tenant-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-box" style="max-width:620px">
    <button class="modal-close" id="close-tenant-modal">✕</button>
    <div class="modal-title" id="tenant-modal-title">Shto Tenant</div>
    <div id="tenant-modal-body"></div>
  </div>
</div>

<!-- ── CONFIRM MODAL ── -->
<div class="modal hidden" id="confirm-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-box" style="max-width:400px">
    <button class="modal-close" id="close-confirm-modal">✕</button>
    <div class="modal-title" id="confirm-title">Konfirmo Veprimin</div>
    <p id="confirm-message" style="color:var(--text-muted);margin-bottom:24px;font-size:14px"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" id="confirm-cancel">Anulo</button>
      <button class="btn btn-danger" id="confirm-ok">Konfirmo</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ── Globals ──
let accessToken = null;
let currentUser = null;
let currentView = 'dashboard';
let allTenants  = [];
let confirmCallback = null;

const API_BASE = '/api';

// ── Theme ──
(function() {
  const s = localStorage.getItem('bizal-theme') || 'light';
  document.documentElement.setAttribute('data-theme', s);
  document.querySelectorAll('.theme-toggle').forEach(b => b.textContent = s === 'dark' ? '☀️' : '🌙');
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const c = document.documentElement.getAttribute('data-theme');
  const n = c === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('bizal-theme', n);
  document.querySelectorAll('.theme-toggle').forEach(b => b.textContent = n === 'dark' ? '☀️' : '🌙');
});

// ── Toast ──
function toast(msg, type = 'success') {
  const w = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); }, 3500);
}

// ── Confirm dialog ──
function confirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-message').textContent = msg;
  document.getElementById('confirm-modal').classList.remove('hidden');
  confirmCallback = cb;
}
document.getElementById('confirm-cancel').addEventListener('click', () => { document.getElementById('confirm-modal').classList.add('hidden'); confirmCallback = null; });
document.getElementById('confirm-ok').addEventListener('click', () => { document.getElementById('confirm-modal').classList.add('hidden'); if (confirmCallback) confirmCallback(); confirmCallback = null; });
document.getElementById('close-confirm-modal').addEventListener('click', () => { document.getElementById('confirm-modal').classList.add('hidden'); confirmCallback = null; });

// ── API calls ──
async function apiGet(ep) {
  const r = await fetch(API_BASE + ep, { headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' } });
  if (r.status === 401) { doLogout(); return null; }
  return r;
}
async function apiPost(ep, body) {
  return fetch(API_BASE + ep, { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
}
async function apiPatch(ep, body) {
  return fetch(API_BASE + ep, { method: 'PATCH', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
}
async function apiDelete(ep) {
  return fetch(API_BASE + ep, { method: 'DELETE', headers: { Authorization: 'Bearer ' + accessToken } });
}

// ── Login ──
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Duke u kyçur...';
  try {
    const r = await fetch(API_BASE + '/auth/login/', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.detail || 'Kredenciale të pasakta.'; errEl.classList.remove('hidden'); return; }
    accessToken = d.access;
    // Verify superadmin
    const meR = await fetch(API_BASE + '/auth/me/', { headers: { Authorization: 'Bearer ' + accessToken } });
    const me  = await meR.json();
    if (!me.is_staff && me.role !== 'superadmin') {
      errEl.textContent = 'Akses i refuzuar. Vetëm superadminët mund të hyjnë këtu.';
      errEl.classList.remove('hidden'); accessToken = null; return;
    }
    currentUser = me;
    document.getElementById('sidebar-user-name').textContent = me.full_name || me.email;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    loadView('dashboard');
  } catch { errEl.textContent = 'Gabim rrjeti. Provoni përsëri.'; errEl.classList.remove('hidden'); }
  finally { btn.disabled = false; btn.textContent = 'Kyçu →'; }
}

// ── Logout ──
document.getElementById('logout-btn').addEventListener('click', doLogout);
function doLogout() {
  accessToken = null; currentUser = null;
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-password').value = '';
}

// ── Sidebar nav ──
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => loadView(btn.dataset.view));
});

function setActiveNav(view) {
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  const titles = { dashboard: 'Dashboard', tenants: 'Të gjithë Tenantët', pending: 'Tenantë në Pritje', users: 'Përdoruesit', plans: 'Planet & Çmimet' };
  document.getElementById('topbar-title').textContent = titles[view] || view;
  currentView = view;
}

// ── View Router ──
async function loadView(view) {
  setActiveNav(view);
  const content = document.getElementById('main-content');
  content.innerHTML = `<div style="text-align:center;padding:80px;color:var(--text-muted)"><div class="spinner" style="width:32px;height:32px;border-width:3px;margin:0 auto 16px"></div></div>`;
  const views = { dashboard: renderDashboard, tenants: renderTenants, pending: renderPending, users: renderUsers, plans: renderPlans };
  if (views[view]) await views[view](content);
}

// ── DASHBOARD ──
async function renderDashboard(el) {
  const r = await apiGet('/tenant/superadmin/tenants/');
  if (!r) return;
  const tenants = await r.json();
  allTenants = Array.isArray(tenants) ? tenants : (tenants.results || []);

  const total    = allTenants.length;
  const active   = allTenants.filter(t => t.is_active).length;
  const inactive = allTenants.filter(t => !t.is_active).length;
  const pro      = allTenants.filter(t => t.plan === 'pro').length;
  const enterprise = allTenants.filter(t => t.plan === 'enterprise').length;

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-card-label">Total Tenantë</div><div class="stat-card-value">${total}</div><div class="stat-card-sub">Regjistruar deri tani</div></div>
      <div class="stat-card green"><div class="stat-card-label">Aktivë</div><div class="stat-card-value">${active}</div><div class="stat-card-sub">Biznese funksionale</div></div>
      <div class="stat-card amber"><div class="stat-card-label">Në Pritje</div><div class="stat-card-value">${inactive}</div><div class="stat-card-sub">Presin aktivizim</div></div>
      <div class="stat-card"><div class="stat-card-label">Plan Pro</div><div class="stat-card-value">${pro}</div><div class="stat-card-sub">@ €40/muaj</div></div>
      <div class="stat-card"><div class="stat-card-label">Enterprise</div><div class="stat-card-value">${enterprise}</div><div class="stat-card-sub">@ €80+/muaj</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">⏳ Tenantë të Rinj (Presin Aktivizim)</span>
        <button class="btn btn-sm btn-outline" onclick="loadView('pending')">Shiko të gjithë</button>
      </div>
      <div class="panel-body">
        ${renderPendingTable(allTenants.filter(t => !t.is_active).slice(0, 5))}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🏢 Tenantët e Fundit</span>
      </div>
      <div class="panel-body">
        ${renderTenantsTable(allTenants.slice(0, 10), false)}
      </div>
    </div>`;

  bindTableActions(el);
}

// ── TENANTS VIEW ──
async function renderTenants(el) {
  const r = await apiGet('/tenant/superadmin/tenants/');
  if (!r) return;
  const data = await r.json();
  allTenants = Array.isArray(data) ? data : (data.results || []);

  el.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🏢 Të gjithë Tenantët (${allTenants.length})</span>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input type="text" id="tenant-search" class="search-input" placeholder="Kërko sipas emrit ose slug-ut..." />
          <button class="btn btn-primary btn-sm" id="btn-add-tenant">+ Shto Tenant</button>
        </div>
      </div>
      <div class="panel-body" style="padding:0">
        <div id="tenants-table-wrap" class="table-wrap">
          ${renderTenantsTable(allTenants, true)}
        </div>
      </div>
    </div>`;

  el.querySelector('#btn-add-tenant')?.addEventListener('click', () => openTenantModal(null));

  el.querySelector('#tenant-search')?.addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const filtered = allTenants.filter(t => t.name.toLowerCase().includes(q) || t.slug.toLowerCase().includes(q) || (t.business_type||'').toLowerCase().includes(q));
    el.querySelector('#tenants-table-wrap').innerHTML = renderTenantsTable(filtered, true);
    bindTableActions(el);
  });

  bindTableActions(el);
}

// ── PENDING VIEW ──
async function renderPending(el) {
  if (!allTenants.length) {
    const r = await apiGet('/tenant/superadmin/tenants/');
    if (!r) return;
    const data = await r.json();
    allTenants = Array.isArray(data) ? data : (data.results || []);
  }
  const pending = allTenants.filter(t => !t.is_active);

  el.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">⏳ Tenantë në Pritje (${pending.length})</span>
      </div>
      <div class="panel-body" style="padding:0">
        <div class="table-wrap">${renderPendingTable(pending)}</div>
      </div>
    </div>`;

  bindTableActions(el);
}

// ── USERS VIEW ──
async function renderUsers(el) {
  el.innerHTML = `
    <div class="panel">
      <div class="panel-header"><span class="panel-title">👥 Menaxhimi i Përdoruesve</span></div>
      <div class="panel-body">
        <p style="color:var(--text-muted);font-size:14px">Shkoni tek paneli Django Admin për menaxhim të detajuar të përdoruesve.</p>
        <a href="/admin/accounts/user/" target="_blank" class="btn btn-outline" style="margin-top:16px">Hap Django Admin →</a>
      </div>
    </div>`;
}

// ── PLANS VIEW ──
async function renderPlans(el) {
  el.innerHTML = `
    <div class="stats-grid" style="max-width:760px">
      <div class="stat-card"><div class="stat-card-label">Starter</div><div class="stat-card-value" style="color:var(--text-muted)">€15</div><div class="stat-card-sub">/ muaj · bazë</div></div>
      <div class="stat-card"><div class="stat-card-label">Pro</div><div class="stat-card-value">€40</div><div class="stat-card-sub">/ muaj · popullar</div></div>
      <div class="stat-card"><div class="stat-card-label">Enterprise</div><div class="stat-card-value" style="color:#7C3AED">€80+</div><div class="stat-card-sub">/ muaj · custom</div></div>
    </div>
    <div class="panel" style="max-width:760px">
      <div class="panel-header"><span class="panel-title">💳 Konfigurimi i Planeve</span></div>
      <div class="panel-body">
        <p style="color:var(--text-muted);font-size:14px;line-height:1.6">Planet e çmimeve konfigurohen direkt nga kodi (<code>tenants/models.py → PLAN_FEATURES</code>) dhe Stripe dashboard. Aktivizoni ose ndrysoni planin e çdo tenant nga tabela e Tenantëve.</p>
      </div>
    </div>`;
}

// ── Table renderers ──
function renderTenantsTable(tenants, actions) {
  if (!tenants.length) return `<table><tbody><tr class="empty-row"><td colspan="7">Nuk u gjet asnjë tenant.</td></tr></tbody></table>`;
  return `<table>
    <thead><tr>
      <th>Biznesi</th><th>Tipi</th><th>Plani</th><th>Statusi</th><th>Krijuar</th>${actions ? '<th>Veprimet</th>' : ''}
    </tr></thead>
    <tbody>${tenants.map(t => `
      <tr>
        <td>
          <div class="tenant-name-cell">
            <div class="tenant-avatar">${(t.name||'?')[0].toUpperCase()}</div>
            <div>
              <div class="tenant-name-text">${esc(t.name)}</div>
              <div class="tenant-slug">${esc(t.slug)}.bizal.al</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text-muted);font-size:13px">${esc(t.business_type||'—')}</td>
        <td><span class="badge badge-${t.plan}">${t.plan}</span></td>
        <td><span class="badge ${t.is_active ? 'badge-active' : 'badge-pending'}">${t.is_active ? '✓ Aktiv' : '⏳ Pritje'}</span></td>
        <td style="color:var(--text-muted);font-size:13px">${fmtDate(t.created_at)}</td>
        ${actions ? `<td>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${!t.is_active ? `<button class="btn btn-xs btn-success" data-action="activate" data-id="${t.id}" data-name="${esc(t.name)}">✓ Aktivo</button>` : ''}
            <button class="btn btn-xs btn-outline" data-action="edit" data-id="${t.id}">✏️ Ndrysho</button>
            <a href="/?tenant=${t.slug}" target="_blank" class="btn btn-xs btn-ghost">↗ Shiko</a>
            <button class="btn btn-xs btn-danger" data-action="delete" data-id="${t.id}" data-name="${esc(t.name)}">🗑</button>
          </div>
        </td>` : ''}
      </tr>`).join('')}
    </tbody></table>`;
}

function renderPendingTable(tenants) {
  if (!tenants.length) return `<p style="color:var(--text-muted);font-size:14px;padding:24px 0">Nuk ka tenant në pritje. 🎉</p>`;
  return `<table>
    <thead><tr><th>Biznesi</th><th>Tipi</th><th>Slug</th><th>Krijuar</th><th>Veprimet</th></tr></thead>
    <tbody>${tenants.map(t => `
      <tr>
        <td><div class="tenant-name-cell"><div class="tenant-avatar">${(t.name||'?')[0].toUpperCase()}</div><div class="tenant-name-text">${esc(t.name)}</div></div></td>
        <td style="color:var(--text-muted);font-size:13px">${esc(t.business_type||'—')}</td>
        <td style="font-family:monospace;font-size:13px;color:var(--primary)">${esc(t.slug)}</td>
        <td style="color:var(--text-muted);font-size:13px">${fmtDate(t.created_at)}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-xs btn-success" data-action="activate" data-id="${t.id}" data-name="${esc(t.name)}">✓ Aktivo</button>
            <button class="btn btn-xs btn-danger"  data-action="delete"   data-id="${t.id}" data-name="${esc(t.name)}">🗑 Fshi</button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

// ── Bind table action buttons ──
function bindTableActions(el) {
  el.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const id     = btn.dataset.id;
      const name   = btn.dataset.name;

      if (action === 'activate') {
        confirm('Aktivo Tenant', `Jeni i sigurt që dëshironi të aktivizoni "${name}"?`, async () => {
          const r = await apiPatch(`/tenant/superadmin/tenants/${id}/`, { is_active: true });
          if (r.ok) { toast(`✓ "${name}" u aktivizua!`); loadView(currentView); }
          else { toast('Gabim gjatë aktivizimit.', 'error'); }
        });
      }
      else if (action === 'edit') {
        const t = allTenants.find(x => x.id === id);
        if (t) openTenantModal(t);
      }
      else if (action === 'delete') {
        confirm('Fshi Tenant', `Kjo veprim është e pakthyeshme. Fshi "${name}" dhe të gjitha të dhënat e tij?`, async () => {
          const r = await apiDelete(`/tenant/superadmin/tenants/${id}/`);
          if (r.ok || r.status === 204) { toast(`"${name}" u fshi.`); allTenants = allTenants.filter(x => x.id !== id); loadView(currentView); }
          else { toast('Gabim gjatë fshirjes.', 'error'); }
        });
      }
    });
  });
}

// ── Tenant Edit / Create Modal ──
function openTenantModal(tenant) {
  const isNew = !tenant;
  document.getElementById('tenant-modal-title').textContent = isNew ? '+ Shto Tenant të Ri' : `✏️ Ndrysho: ${tenant.name}`;

  document.getElementById('tenant-modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Emri i Biznesit *</label><input id="tm-name" class="form-input" value="${esc(tenant?.name||'')}" /></div>
      <div class="form-group"><label class="form-label">Slug (subdomain) *</label><input id="tm-slug" class="form-input" value="${esc(tenant?.slug||'')}" ${!isNew ? 'readonly style="opacity:.6"' : ''} /></div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Tipi Biznesi</label>
        <select id="tm-type" class="form-select">
          ${['restaurant','hotel','car_rental','clinic','barbershop','gym','pharmacy','market','property_rental','spa','lawyer','language_school','bar','bakery'].map(v =>
            `<option value="${v}" ${tenant?.business_type===v?'selected':''}>${v.replace('_',' ')}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Plani</label>
        <select id="tm-plan" class="form-select">
          <option value="starter" ${tenant?.plan==='starter'?'selected':''}>Starter — €15/muaj</option>
          <option value="pro"     ${tenant?.plan==='pro'?'selected':''}>Pro — €40/muaj</option>
          <option value="enterprise" ${tenant?.plan==='enterprise'?'selected':''}>Enterprise — €80+/muaj</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Email</label><input id="tm-email" type="email" class="form-input" value="${esc(tenant?.email||'')}" /></div>
      <div class="form-group"><label class="form-label">Telefon</label><input id="tm-phone" class="form-input" value="${esc(tenant?.phone||'')}" /></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Qyteti</label><input id="tm-city" class="form-input" value="${esc(tenant?.city||'')}" /></div>
      <div class="form-group"><label class="form-label">Ngjyra Kryesore</label><input id="tm-color" type="color" class="form-input" value="${tenant?.primary_color||'#2563EB'}" style="height:42px;padding:4px 8px" /></div>
    </div>
    <div class="form-group">
      <label class="form-label">Tagline</label>
      <input id="tm-tagline" class="form-input" value="${esc(tenant?.tagline||'')}" placeholder="Slogan ose përshkrim i shkurtër" />
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="tm-active" ${tenant?.is_active?'checked':''} style="width:18px;height:18px;accent-color:var(--primary)" />
      <label for="tm-active" style="font-size:14px;font-weight:600;cursor:pointer">Aktiv — Visible për klientët</label>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" id="tm-cancel">Anulo</button>
      <button class="btn btn-primary" id="tm-save">${isNew ? 'Krijo Tenant' : 'Ruaj Ndryshimet'}</button>
    </div>
    <div id="tm-feedback" class="feedback hidden"></div>`;

  const modal = document.getElementById('tenant-modal');
  modal.classList.remove('hidden');

  modal.querySelector('.modal-backdrop').onclick = () => modal.classList.add('hidden');
  document.getElementById('close-tenant-modal').onclick = () => modal.classList.add('hidden');
  document.getElementById('tm-cancel').onclick = () => modal.classList.add('hidden');

  document.getElementById('tm-save').addEventListener('click', async () => {
    const body = {
      name:          document.getElementById('tm-name').value.trim(),
      slug:          document.getElementById('tm-slug').value.trim(),
      business_type: document.getElementById('tm-type').value,
      plan:          document.getElementById('tm-plan').value,
      email:         document.getElementById('tm-email').value.trim(),
      phone:         document.getElementById('tm-phone').value.trim(),
      city:          document.getElementById('tm-city').value.trim(),
      tagline:       document.getElementById('tm-tagline').value.trim(),
      primary_color: document.getElementById('tm-color').value,
      is_active:     document.getElementById('tm-active').checked,
    };
    const fb  = document.getElementById('tm-feedback');
    const btn = document.getElementById('tm-save');
    btn.disabled = true; btn.textContent = 'Duke ruajtur...';
    try {
      let r;
      if (isNew) {
        // For new tenants, need owner info — simplified for superadmin
        r = await apiPost('/tenant/superadmin/tenants/', body);
      } else {
        r = await apiPatch(`/tenant/superadmin/tenants/${tenant.id}/`, body);
      }
      if (r.ok) {
        modal.classList.add('hidden');
        toast(isNew ? '✓ Tenant u krijua me sukses!' : '✓ Ndryshimet u ruajtën!');
        allTenants = []; // invalidate cache
        loadView(currentView);
      } else {
        const err = await r.json();
        fb.textContent = Object.values(err).flat().join(' ') || 'Gabim. Provoni përsëri.';
        fb.className = 'feedback error';
      }
    } catch { fb.textContent = 'Gabim rrjeti.'; fb.className = 'feedback error'; }
    finally { btn.disabled = false; btn.textContent = isNew ? 'Krijo Tenant' : 'Ruaj Ndryshimet'; }
  });
}

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('sq-AL',{day:'numeric',month:'short',year:'numeric'}); }
</script>
</body>
</html>
