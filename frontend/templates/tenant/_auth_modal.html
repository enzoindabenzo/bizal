<div class="modal hidden" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-heading">
  <div class="modal-backdrop"></div>
  <div class="modal-box modal-sm">
    <button class="modal-close" id="close-auth" aria-label="Mbyll">✕</button>
    <h2 id="auth-modal-heading" class="sr-only">Hyrje / Regjistrim</h2>
    <div class="auth-tabs" id="auth-tabs">
      <button class="tab-btn active" id="tab-login">Hyr</button>
      <button class="tab-btn" id="tab-register">Regjistrohu</button>
    </div>
    <div id="auth-form-content"></div>
    <div id="auth-error" class="error-msg hidden"></div>
  </div>
</div>
