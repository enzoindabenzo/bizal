<body>

    <li><a href="/services/" class="nav-link" data-page="services" id="nav-services">Shërbimet</a></li>
    <li><a href="/menu/" class="nav-link hidden" data-page="menu" id="nav-menu">Menu</a></li>
    <li><a href="/about/" class="nav-link" data-page="about">Rreth Nesh</a></li>
    <li><a href="/contact/" class="nav-link" data-page="contact" id="nav-contact">Kontakt</a></li>
  </ul>

  <div class="nav-auth" id="nav-auth">
    <button class="btn btn-outline btn-sm" id="btn-login">Hyr</button>
    <button class="btn btn-primary btn-sm" id="btn-register">Regjistrohu</button>
  </div>

  <button class="nav-toggle" id="nav-toggle" aria-label="Menu">

<!-- MOBILE DRAWER -->

  <div class="drawer-auth" id="drawer-auth"></div>
</div>

<!-- PAGE CONTENT injected here -->
<main id="main-content">

<!-- FOOTER -->
<footer class="footer" id="footer">
  <div class="container footer-grid">
    <div class="footer-col footer-brand-col">
      <img id="footer-logo" src="" alt="" class="footer-logo hidden" />
      <span id="footer-name" class="footer-name"></span>
      <p id="footer-tagline" class="footer-tagline"></p>
    </div>
    <div class="footer-col">
      <h4 class="footer-heading">Lidhje</h4>
      <nav class="footer-nav">
        <a href="/">Kryefaqja</a>
        <a href="/services/" id="footer-services-link">Shërbimet</a>
        <a href="/about/">Rreth Nesh</a>
        <a href="/contact/">Kontakt</a>
      </nav>
    </div>
    <div class="footer-col" id="footer-contact-col">
      <h4 class="footer-heading">Kontakti</h4>
      <div id="footer-contact-info"></div>
    </div>
    <div class="footer-col hidden" id="footer-social-col">
      <h4 class="footer-heading">Na Ndiqni</h4>
      <div id="footer-social-links"></div>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="container">
      <p id="footer-copy"></p>
    </div>
  </div>
</footer>

<!-- AUTH MODAL -->
<div class="modal hidden" id="auth-modal" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="modal-box modal-sm">
    <button class="modal-close" id="close-auth" aria-label="Mbyll">✕</button>
    <div class="auth-tabs" id="auth-tabs">
      <button class="tab-btn active" id="tab-login">Hyr</button>
      <button class="tab-btn" id="tab-register">Regjistrohu</button>
    </div>
    <div id="auth-form-content"></div>
    <div id="auth-error" class="error-msg hidden"></div>
  </div>
</div>

</body>
</html>
