name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests (pytest + PostgreSQL)
    runs-on: ubuntu-latest

    # Needed so the "Commit coverage badge" step below can push
    # .github/badges/coverage.json back to main with the default token.
    permissions:
      contents: write

    # settings/test.py switches DATABASES to real Postgres whenever DB_HOST
    # is set (see comment there) — that's how the suite exercises
    # Postgres-only behaviour (select_for_update() locking, NULLS LAST
    # ordering, JSONField queries, CheckConstraint enforcement) instead of
    # silently running against SQLite in-memory the way local `manage.py
    # test` does. Version pinned to match docker-compose.yml's db service.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bizal_test
          POSTGRES_USER: bizal
          POSTGRES_PASSWORD: bizal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bizal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: bizal_test
      DB_USER: bizal
      DB_PASSWORD: bizal
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      # requirements-dev.txt layers coverage/pytest/pytest-django/pytest-cov
      # on top of requirements.txt via -r, so this one install covers both.
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # pytest.ini already points DJANGO_SETTINGS_MODULE at bizal.settings.test
      # and conftest.py falls back to the same value, so no extra flags needed.
      - name: Run test suite with coverage
        working-directory: backend
        run: |
          coverage run -m pytest
          coverage report --fail-under=85
          coverage xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      # Coverage badge with no external service (no Codecov token, no gist):
      # write a shields.io "endpoint" JSON file and commit it back to main.
      # README points a shields.io badge at the raw file on GitHub, so the
      # badge always reflects the last coverage run on main. Skipped on PRs
      # (no push rights needed) and on non-main pushes.
      - name: Generate coverage badge data
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: backend
        run: |
          PCT=$(coverage report --format=total)
          COLOR=$(python -c "
          p = $PCT
          if p >= 90:
              c = 'brightgreen'
          elif p >= 80:
              c = 'green'
          elif p >= 70:
              c = 'yellowgreen'
          elif p >= 60:
              c = 'orange'
          else:
              c = 'red'
          print(c)
          ")
          mkdir -p ../.github/badges
          cat > ../.github/badges/coverage.json <<JSON
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${PCT}%",
            "color": "${COLOR}"
          }
          JSON

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push

  requirements-lock-check:
    name: requirements.txt in sync with requirements.in
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Makefile already defines this exact CI target: fails the build if
      # requirements.in changed without regenerating the committed lockfile.
      - run: make lock-check

  frontend:
    name: Frontend tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        run: npm test