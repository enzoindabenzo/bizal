# BizAL — production nginx configuration.
#
# This file is for a standalone nginx host (VPS or bare-metal).
# For Docker-based deployments, use nginx/nginx.conf instead, which is
# designed to sit inside a Docker nginx service pointed at the `web`
# upstream via the internal Docker network.
#
# Prerequisites:
#   1. Run certbot to generate certificates:
#        certbot certonly --webroot -w /var/www/certbot -d bizal.al -d *.bizal.al
#   2. Copy this file to /etc/nginx/nginx.conf (or include it)
#   3. nginx -t && systemctl reload nginx

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Rate-limit zones ──────────────────────────────────────────────────
    # Django admin — 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=django_admin:10m rate=5r/m;

    upstream bizal_app {
        # gunicorn bound to 127.0.0.1:8000 on the host (not Docker)
        server 127.0.0.1:8000;
        # keeps a pool of idle connections to gunicorn open between requests
        # instead of opening a new TCP connection per proxied request — see
        # the matching fix and rationale in nginx/nginx.conf (Docker config).
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name bizal.al *.bizal.al;

        # ACME challenge for Let's Encrypt cert renewal.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Django admin: rate-limited before redirect so brute-force on the
        # HTTP port is also slowed.
        location /django-admin/ {
            limit_req zone=django_admin burst=3 nodelay;
            limit_req_status 429;
            return 301 https://$host$request_uri;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name bizal.al *.bizal.al;

        ssl_certificate     /etc/letsencrypt/live/bizal.al/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bizal.al/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 20M;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"          always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Django admin: rate-limited ────────────────────────────────────
        location /django-admin/ {
            limit_req zone=django_admin burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://bizal_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
        }

        # ── Static files ──────────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            gzip_static on;
        }

        # ── Media files ───────────────────────────────────────────────────
        # Currently served publicly. If user-uploaded files should be
        # private in a future version, add X-Accel-Redirect auth in Django
        # and re-add `internal;` here.
        location /media/ {
            alias /app/media/;
            # AUDIT FIX: `expires 30d;` made nginx emit its own
            # `Cache-Control: max-age=2592000`, which then collided with the
            # add_header below — producing two contradictory Cache-Control
            # headers in the same response (add_header appends, it does not
            # override a header nginx generated from another directive).
            # Media here may be tenant-private, so don't cache it at all.
            add_header Cache-Control "private, no-store";
        }

        # ── All other requests ────────────────────────────────────────────
        location / {
            proxy_pass http://bizal_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
