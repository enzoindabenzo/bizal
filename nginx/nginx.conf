# BizAL nginx configuration — Docker nginx service
#
# This file is for a Docker-based nginx container that sits in the same
# Docker network as the `web` (port 8000) and `spa` (port 8001) services.
# Proxy targets use Docker service hostnames, NOT 127.0.0.1.
#
# For standalone VPS / bare-metal deployments, use the root nginx.conf
# instead, which proxies to 127.0.0.1 (gunicorn bound on the host).
#
# Handles:
#   - Main domain (bizal.al) → web:8000
#   - Tenant SPA subdomains (*.bizal.al) → spa:8001
#   - Rate limiting on admin panel and auth endpoints
#   - Static file serving via WhiteNoise (handled in Django)
#
# PRODUCTION NOTE: uncomment the HTTPS server blocks below and obtain
# a wildcard TLS certificate (e.g. via certbot --dns-*) before deploying.
# Until TLS termination is configured, SECURE_SSL_REDIRECT in production.py
# must remain False or requests will loop (Django expects https but nginx
# only speaks http). The X-Forwarded-Proto header is set correctly in every
# location block so Django can detect HTTPS as soon as TLS is enabled.

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # LOW-4 FIX: increase proxy buffer sizes to prevent 502 "upstream sent too
    # big header" errors. Django's Set-Cookie + JWT + DRF verbose error headers
    # can exceed nginx's default 4 KB proxy buffer.
    proxy_buffer_size   16k;
    proxy_buffers       8 16k;
    proxy_busy_buffers_size 32k;

    # ── Upstream declarations (Docker service hostnames) ──────────────────────
    # Using upstream blocks instead of inline proxy_pass URLs means nginx
    # will re-resolve the hostnames on each connection rather than caching
    # the IP at startup — important when containers restart and get new IPs.
    # FIX (L-6): `keepalive` keeps a pool of idle connections to gunicorn open
    # between requests instead of opening a new TCP connection per proxied
    # request. Under moderate load this removes a full TCP handshake from
    # every request's latency and reduces gunicorn's connection-accept
    # overhead. Requires proxy_http_version 1.1 and a cleared Connection
    # header on every location block using these upstreams (set below) —
    # keepalive connections to upstream only work over HTTP/1.1, and the
    # default HTTP/1.0-style "Connection: close" would defeat the pool.
    upstream django_main {
        server web:8000;
        keepalive 32;
    }
    upstream django_spa {
        server spa:8001;
        keepalive 32;
    }

    # ── Rate-limit zones ──────────────────────────────────────────────────────
    # Auth endpoints — 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    # Django admin — 2 requests/second per IP (human browsing, not brute-force)
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;
    # General API — 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Default server: drop requests for unrecognised hosts ─────────────────
    # L-1 FIX (v43): Without a default_server, nginx selects the first listed
    # server block for any Host header that doesn't match an explicit server_name.
    # This could serve main-domain content to requests for arbitrary hostnames
    # (e.g. direct IP access, an unknown subdomain like `unknown.bizal.al` that
    # the tenant regex doesn't match, or a misconfigured load balancer). Returning
    # 444 (nginx's "close connection silently" code) drops these requests before
    # any content is sent, which is the correct behaviour for unrecognised virtual
    # hosts. Note: the tenant SPA block (`~^(?<tenant>[^.]+)\.bizal\.al$`) already
    # passes unknown slugs to Django which returns Http404; this default_server only
    # catches hosts that don't match ANY server_name, not unrecognised tenant slugs.
    server {
        listen 80 default_server;
        server_name _;
        # LOW-4 FIX: Limit body buffering before the 444 fires. Without this,
        # nginx buffers up to its compiled-in default (1MB) from a large-body
        # upload to an unrecognised host before closing the connection, wasting
        # memory. 1k is sufficient — the connection is dropped immediately.
        client_max_body_size 1k;
        return 444;
    }

    # ── Main platform (bizal.al) ──────────────────────────────────────────────
    server {
        listen 80;
        server_name bizal.al www.bizal.al;

        client_max_body_size 10M;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.groq.com https://openrouter.ai https://api.stripe.com; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdnjs.cloudflare.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Compression ──────────────────────────────────────────────────────
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/javascript;
        gzip_min_length 1024;
        gzip_vary on;

        # Auth endpoints — strict rate limit
        # FIX (H-1, M-5): add X-Forwarded-Proto and X-Forwarded-For to every
        # location block.  production.py reads SECURE_PROXY_SSL_HEADER =
        # ('HTTP_X_FORWARDED_PROTO', 'https'); without this header Django never
        # sees HTTPS and SECURE_SSL_REDIRECT causes an infinite redirect loop.
        location ~ ^/api/auth/(login|register|password-reset)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         http://django_main;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Django admin — rate limited
        location /django-admin/ {
            limit_req zone=admin_limit burst=20;
            limit_req_status 429;
            proxy_pass         http://django_main;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Stripe webhooks — no rate limit (signed by Stripe)
        location /api/payments/webhook/ {
            proxy_pass         http://django_main;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # H-1 FIX: Serve user-uploaded media files (logos, product/menu/blog images,
        # avatars) directly from nginx. Django's static() helper is DEBUG-gated and
        # contributes nothing to urlpatterns under DEBUG=False (production.py always
        # enforces DEBUG=False). Without this block every /media/... request falls
        # through to Django and returns 404.
        #
        # Requires the nginx service in docker-compose.yml to mount media_data at
        # /app/media (see the volumes section of the nginx service).
        #
        # M-1 FIX: Replaced "public, immutable" with "public, must-revalidate".
        # The `immutable` directive tells browsers/CDNs the resource will never
        # change for the full TTL (7 days). But /media/ serves mutable user-uploaded
        # content (avatars, logos, product images). When a user updates their avatar
        # or a tenant updates their logo, `immutable` would cause browsers and CDNs
        # to serve the stale file for up to 7 days without revalidation. Using
        # `must-revalidate` with a 1-day TTL allows normal HTTP conditional requests
        # (ETag / Last-Modified) so updates are reflected within one day at most.
        # LOW-6 FIX: Added X-Content-Type-Options for defence-in-depth against
        # MIME-type confusion attacks on user-uploaded files.
        location /media/ {
            alias /app/media/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Health check — no rate limiting so Docker/load-balancer probes are never throttled
        # LOW-2 FIX: explicit location exempt from api_limit zone
        location /health/ {
            proxy_pass         http://django_main;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other requests
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass         http://django_main;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── Tenant SPAs (*.bizal.al) ──────────────────────────────────────────────
    server {
        listen 80;
        server_name ~^(?<tenant>[^.]+)\.bizal\.al$;

        client_max_body_size 10M;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.groq.com https://openrouter.ai https://api.stripe.com; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdnjs.cloudflare.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Compression ──────────────────────────────────────────────────────
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/javascript;
        gzip_min_length 1024;
        gzip_vary on;

        # Auth endpoints on tenant subdomains
        location ~ ^/api/auth/(login|register|password-reset)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         http://django_spa;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Django admin on tenant subdomains — rate limited
        # LOW-2 FIX: Django admin is accessible on both services (one ROOT_URLCONF).
        # Without this block, /django-admin/ on *.bizal.al falls through to the
        # general api_limit zone (60r/m) instead of the stricter admin_limit (2r/s).
        location /django-admin/ {
            limit_req zone=admin_limit burst=20;
            limit_req_status 429;
            proxy_pass         http://django_spa;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # H-1 FIX: Serve media files on tenant subdomains as well.
        # M-1 FIX / LOW-6 FIX: Same cache and security header fixes as the main
        # domain block above — must-revalidate instead of immutable, and
        # X-Content-Type-Options: nosniff for defence-in-depth.
        location /media/ {
            alias /app/media/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Health check — no rate limiting
        # LOW-2 FIX
        location /health/ {
            proxy_pass         http://django_spa;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass         http://django_spa;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

